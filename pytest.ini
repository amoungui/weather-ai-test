[pytest]
# Chemins à tester
testpaths = tests

# Options par défaut
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=xml
    --cov-report=term
    --cov-fail-under=0

# Dossiers à ignorer
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    node_modules
    app/templates
    app/static

# Marqueurs personnalisés
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow tests