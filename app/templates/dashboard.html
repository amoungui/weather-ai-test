<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .header {
        background: white;
        padding: 20px 30px;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .header h1 {
        color: #333;
        font-size: 1.8rem;
      }
      .header h1 span {
        color: #667eea;
      }
      .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .provider-badge {
        display: inline-block;
        background: #4caf50;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
      }
      .btn-back {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
      .btn-back:hover {
        text-decoration: underline;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      .card h3 {
        color: #333;
        margin-bottom: 15px;
        font-size: 1.1rem;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #666;
        font-weight: 500;
        font-size: 0.9rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn-primary {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
        transition: background 0.3s;
      }
      .btn-primary:hover {
        background: #5563c1;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .weather-display {
        display: none;
      }
      .weather-display.active {
        display: block;
      }
      .weather-current {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
        flex-wrap: wrap;
        gap: 10px;
      }
      .weather-temp {
        font-size: 3rem;
        font-weight: bold;
        color: #333;
      }
      .weather-desc {
        color: #666;
        font-size: 1.1rem;
      }
      .location-name {
        font-size: 1.2rem;
        font-weight: 600;
        color: #333;
      }
      .weather-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        margin: 15px 0;
      }
      .weather-detail {
        background: #f7f7f7;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
      }
      .weather-detail .label {
        font-size: 0.8rem;
        color: #888;
      }
      .weather-detail .value {
        font-weight: 600;
        color: #333;
      }
      .forecast-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        margin: 15px 0;
      }
      .forecast-day {
        background: #f7f7f7;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
      }
      .forecast-day .date {
        font-size: 0.8rem;
        font-weight: 600;
        color: #555;
      }
      .forecast-day .temp {
        font-weight: 600;
        color: #333;
        font-size: 0.95rem;
      }
      .forecast-day .desc {
        font-size: 0.7rem;
        color: #888;
      }
      .forecast-day .precip {
        font-size: 0.65rem;
        color: #4a90d9;
      }
      .error-msg {
        background: #fee;
        color: #c33;
        padding: 10px;
        border-radius: 8px;
        margin: 10px 0;
        display: none;
      }
      .error-msg.active {
        display: block;
      }
      .loading {
        text-align: center;
        padding: 20px;
        color: #666;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .no-result {
        text-align: center;
        color: #999;
        padding: 30px;
      }
      .provider-info {
        margin-top: 15px;
        font-size: 0.8rem;
        color: #888;
        text-align: center;
      }
      .ai-summary {
        background: #f8f9ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 8px;
        margin: 15px 0;
      }
      .ai-summary p {
        color: #444;
        line-height: 1.6;
        margin: 0;
      }
      .ai-summary .label-ai {
        font-weight: 600;
        color: #667eea;
      }
      .weather-icon {
        font-size: 2rem;
        margin-top: 5px;
      }
      .rate-limit-info {
        margin-top: 10px;
        font-size: 0.8rem;
        color: #888;
        text-align: center;
      }
      .forecast-title {
        margin-top: 20px;
        margin-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
      }
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .weather-temp {
          font-size: 2.5rem;
        }
        .header {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🌤️ Weather <span>Dashboard</span></h1>
        <div class="header-actions">
          <span class="provider-badge" id="providerBadge">Loading...</span>
          <a href="/" class="btn-back">← Home</a>
        </div>
      </div>

      <div class="grid">
        <!-- Search Card -->
        <div class="card">
          <h3>🔍 Search Weather</h3>
          <form id="weatherForm">
            <div class="form-group">
              <label for="lat">Latitude</label>
              <input
                type="number"
                id="lat"
                value="-1.2921"
                step="0.0001"
                required
              />
            </div>
            <div class="form-group">
              <label for="lon">Longitude</label>
              <input
                type="number"
                id="lon"
                value="36.8219"
                step="0.0001"
                required
              />
            </div>
            <div class="form-group">
              <label for="days">Forecast Days</label>
              <select id="days">
                <option value="1">1 day</option>
                <option value="3" selected>3 days</option>
                <option value="5">5 days</option>
                <option value="7">7 days</option>
              </select>
            </div>
            <div class="form-group">
              <label for="units">Units</label>
              <select id="units">
                <option value="metric">Metric (°C)</option>
                <option value="imperial">Imperial (°F)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="ai">AI Summary</label>
              <select id="ai">
                <option value="true">Enabled</option>
                <option value="false">Disabled</option>
              </select>
            </div>
            <button type="submit" class="btn-primary" id="searchBtn">
              🌡️ Get Weather
            </button>
          </form>
          <div id="errorMsg" class="error-msg"></div>
        </div>

        <!-- Results Card -->
        <div class="card">
          <h3>🌡️ Weather Results</h3>
          <div id="loading" class="loading" style="display: none">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
          </div>
          <div id="noResult" class="no-result">
            <p>🔍 Enter coordinates and click "Get Weather"</p>
          </div>
          <div id="weatherResult" class="weather-display">
            <div class="weather-current">
              <div>
                <div class="weather-temp" id="temp">--</div>
                <div class="weather-desc" id="description">--</div>
                <div class="weather-icon" id="weatherIcon">🌡️</div>
              </div>
              <div style="text-align: right">
                <div class="location-name" id="location">--</div>
                <div style="font-size: 0.8rem; color: #aaa" id="time">--</div>
              </div>
            </div>
            <div class="weather-details">
              <div class="weather-detail">
                <div class="label">💨 Wind</div>
                <div class="value" id="wind">--</div>
              </div>
              <div class="weather-detail">
                <div class="label">🧭 Direction</div>
                <div class="value" id="windDirection">--</div>
              </div>
              <div class="weather-detail">
                <div class="label">⏱️ Interval</div>
                <div class="value" id="interval">--</div>
              </div>
              <div class="weather-detail">
                <div class="label">🌅 Day/Night</div>
                <div class="value" id="isDay">--</div>
              </div>
            </div>
            <div id="aiSummary" class="ai-summary" style="display: none">
              <p>
                <span class="label-ai">🤖 AI Summary:</span>
                <span id="aiText">--</span>
              </p>
            </div>
            <h4 class="forecast-title">📅 Forecast</h4>
            <div id="forecast" class="forecast-grid">
              <div
                class="forecast-day"
                style="grid-column: 1/-1; background: #f0f0f0"
              >
                <p style="color: #888">Loading forecast...</p>
              </div>
            </div>
            <div class="provider-info">
              <span>Provider: </span><span id="providerInfo">--</span>
            </div>
            <div class="rate-limit-info">
              <span>Rate Limit: </span><span id="rateLimit">--</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ============================================================
      // Weather Helpers
      // ============================================================

      function getWeatherEmoji(code) {
        const map = {
          0: "☀️",
          1: "🌤️",
          2: "⛅",
          3: "☁️",
          45: "🌫️",
          48: "🌫️",
          51: "🌧️",
          53: "🌧️",
          55: "🌧️",
          56: "🌧️",
          57: "🌧️",
          61: "🌧️",
          63: "🌧️",
          65: "🌧️",
          66: "🌧️",
          67: "🌧️",
          71: "❄️",
          73: "❄️",
          75: "❄️",
          77: "❄️",
          80: "🌧️",
          81: "🌧️",
          82: "🌧️",
          85: "❄️",
          86: "❄️",
          95: "⛈️",
          96: "⛈️",
          99: "⛈️",
        };
        return map[code] || "🌡️";
      }

      function getWeatherDescription(code) {
        const map = {
          0: "Clear sky",
          1: "Mainly clear",
          2: "Partly cloudy",
          3: "Overcast",
          45: "Fog",
          48: "Freezing fog",
          51: "Light drizzle",
          53: "Moderate drizzle",
          55: "Dense drizzle",
          56: "Light freezing drizzle",
          57: "Dense freezing drizzle",
          61: "Slight rain",
          63: "Moderate rain",
          65: "Heavy rain",
          66: "Light freezing rain",
          67: "Heavy freezing rain",
          71: "Slight snow",
          73: "Moderate snow",
          75: "Heavy snow",
          77: "Snow grains",
          80: "Slight rain showers",
          81: "Moderate rain showers",
          82: "Violent rain showers",
          85: "Slight snow showers",
          86: "Heavy snow showers",
          95: "Thunderstorm",
          96: "Thunderstorm with hail",
          99: "Thunderstorm with heavy hail",
        };
        return map[code] || "Unknown weather";
      }

      // ============================================================
      // API Call
      // ============================================================

      async function fetchWeather(lat, lon, days, units, ai) {
          // Utilisation d'une URL relative - elle s'adaptera automatiquement
          const url = `/api/weather?lat=${lat}&lon=${lon}&days=${days}&units=${units}&ai=${ai}`;
          console.log('📡 Fetching weather:', url);
          
          const response = await fetch(url);
          if (!response.ok) {
              const error = await response.json();
              throw new Error(error.detail || 'Failed to fetch weather data');
          }
          const data = await response.json();
          console.log('📊 Weather data received:', data);
          return data;
      }

      // ============================================================
      // Display Functions
      // ============================================================

      function displayWeather(data) {
        console.log("🖥️ Displaying weather data");

        const current = data.current || {};
        const units = current.units || "metric";
        const tempUnit = units === "metric" ? "°C" : "°F";
        const speedUnit = units === "metric" ? "km/h" : "mph";

        // Temperature
        const temp = current.temperature || current.temp || "--";
        document.getElementById("temp").textContent =
          temp !== "--" ? `${temp}${tempUnit}` : "--°";

        // Weather code and description
        const weatherCode = current.weathercode || current.weather_code;
        const description =
          weatherCode !== undefined
            ? getWeatherDescription(weatherCode)
            : current.description || "--";
        document.getElementById("description").textContent = description;

        // Weather icon
        document.getElementById("weatherIcon").textContent =
          weatherCode !== undefined ? getWeatherEmoji(weatherCode) : "🌡️";

        // Location
        const location = data.location || {};
        const locationName =
          location.display_name ||
          location.name ||
          `📍 ${current.lat || ""}, ${current.lon || ""}`;
        document.getElementById("location").textContent =
          locationName || "WeatherAI";
        document.getElementById("time").textContent = current.time
          ? new Date(current.time).toLocaleString()
          : data.timestamp
            ? new Date(data.timestamp).toLocaleString()
            : "--";

        // Wind
        const windSpeed = current.windspeed || current.wind_speed || "--";
        document.getElementById("wind").textContent =
          windSpeed !== "--" ? `${windSpeed} ${speedUnit}` : "--";

        // Wind direction
        const windDir = current.winddirection || current.wind_direction || "--";
        document.getElementById("windDirection").textContent =
          windDir !== "--" ? `${windDir}°` : "--";

        // Interval
        const interval = current.interval || "--";
        document.getElementById("interval").textContent =
          interval !== "--" ? `${interval}s` : "--";

        // Day/Night
        const isDay = current.is_day;
        document.getElementById("isDay").textContent =
          isDay !== undefined ? (isDay ? "☀️ Day" : "🌙 Night") : "--";

        // AI Summary
        const aiSummary = data.ai_summary;
        const aiDiv = document.getElementById("aiSummary");
        if (aiSummary) {
          aiDiv.style.display = "block";
          document.getElementById("aiText").textContent = aiSummary;
        } else {
          aiDiv.style.display = "none";
        }

        // Provider
        const provider = data.provider || "unknown";
        document.getElementById("providerInfo").textContent = provider;
        document.getElementById("providerBadge").textContent = provider;

        // Rate Limit
        const rateLimit = data.rate_limit || {};
        const remaining = rateLimit.remaining || "N/A";
        const limit = rateLimit.limit || "N/A";
        document.getElementById("rateLimit").textContent =
          `${remaining} / ${limit}`;

        // Show result
        document.getElementById("weatherResult").className =
          "weather-display active";
        document.getElementById("noResult").style.display = "none";
        document.getElementById("loading").style.display = "none";
      }

      function displayForecast(data) {
        console.log("📅 Displaying forecast data");

        const forecastDiv = document.getElementById("forecast");
        forecastDiv.innerHTML = "";

        // WeatherAI uses 'daily' field for forecast
        let forecast = data.daily || data.forecast || data.list || [];

        console.log("📊 Forecast days:", forecast.length);

        if (forecast && forecast.length > 0) {
          forecast.forEach((day, index) => {
            const dayDiv = document.createElement("div");
            dayDiv.className = "forecast-day";

            // Date
            const dateStr =
              day.date || day.time || day.dt_txt || `Day ${index + 1}`;

            // Day name
            let dayName = day.day_name || day.weekday || day.day;
            if (!dayName && dateStr) {
              try {
                const d = new Date(dateStr);
                dayName = [
                  "Sunday",
                  "Monday",
                  "Tuesday",
                  "Wednesday",
                  "Thursday",
                  "Friday",
                  "Saturday",
                ][d.getDay()];
              } catch (e) {
                dayName = "--";
              }
            }

            // Temperatures
            const tempMax =
              day.temp_max !== undefined
                ? day.temp_max
                : day.temperature_max || "--";
            const tempMin =
              day.temp_min !== undefined
                ? day.temp_min
                : day.temperature_min || "--";

            // Weather
            const weatherCode = day.weathercode || day.weather_code;
            const description =
              weatherCode !== undefined
                ? getWeatherDescription(weatherCode)
                : day.description || day.weather_description || "";
            const icon =
              weatherCode !== undefined
                ? getWeatherEmoji(weatherCode)
                : day.icon || "🌡️";

            // Precipitation
            const precip = day.precipitation || day.precip || day.rain || 0;

            dayDiv.innerHTML = `
                        <div class="date">${dayName || dateStr}</div>
                        <div style="font-size:1.8rem;margin:5px 0;">${icon}</div>
                        <div class="temp">${tempMax !== "--" ? tempMax : "--"}° / ${tempMin !== "--" ? tempMin : "--"}°</div>
                        <div class="desc">${description}</div>
                        ${precip > 0 ? `<div class="precip">💧 ${precip}mm</div>` : ""}
                    `;
            forecastDiv.appendChild(dayDiv);
          });
        } else {
          forecastDiv.innerHTML = `
                    <div class="forecast-day" style="grid-column:1/-1;background:#f0f0f0;">
                        <p style="color:#888;">No forecast data available</p>
                        <p style="font-size:0.8rem;color:#aaa;">Try increasing the number of days</p>
                    </div>
                `;
        }
      }

      // ============================================================
      // Form Handler
      // ============================================================

      document
        .getElementById("weatherForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const lat = document.getElementById("lat").value;
          const lon = document.getElementById("lon").value;
          const days = document.getElementById("days").value;
          const units = document.getElementById("units").value;
          const ai = document.getElementById("ai").value;

          const loadingDiv = document.getElementById("loading");
          const errorMsg = document.getElementById("errorMsg");
          const resultDiv = document.getElementById("weatherResult");
          const noResultDiv = document.getElementById("noResult");
          const forecastDiv = document.getElementById("forecast");

          // Reset
          errorMsg.className = "error-msg";
          errorMsg.textContent = "";
          resultDiv.className = "weather-display";
          noResultDiv.style.display = "block";
          forecastDiv.innerHTML = `<div class="forecast-day" style="grid-column:1/-1;background:#f0f0f0;"><p style="color:#888;">Loading forecast...</p></div>`;
          loadingDiv.style.display = "block";

          try {
            const weatherData = await fetchWeather(lat, lon, days, units, ai);
            displayWeather(weatherData);
            displayForecast(weatherData);
          } catch (error) {
            console.error("❌ Error:", error);
            errorMsg.className = "error-msg active";
            errorMsg.textContent = `❌ ${error.message}`;
            noResultDiv.style.display = "block";
          } finally {
            loadingDiv.style.display = "none";
          }
        });

      // ============================================================
      // Auto-load on page load
      // ============================================================

      document.addEventListener("DOMContentLoaded", () => {
        console.log("🚀 Dashboard loaded, fetching initial weather...");
        setTimeout(() => {
          document.getElementById("searchBtn").click();
        }, 500);
      });
    </script>
  </body>
</html>
