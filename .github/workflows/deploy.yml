name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================
  # JOB 1: Tests
  # ============================================
  test_job:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          WEATHER_AI_API_KEY: ${{ secrets.WEATHER_AI_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          APP_ENV: testing
          APP_DEBUG: true
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # JOB 2: Code Quality & SAST
  # ============================================
  code_quality_job:
    name: 🔍 Code Quality & SAST
    runs-on: ubuntu-latest
    needs: test_job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy bandit safety pylint

      - name: Lint with flake8
        run: |
          flake8 app/ --count --max-complexity=10 --max-line-length=100 --statistics --exit-zero

      - name: Security scan with bandit
        run: |
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ============================================
  # JOB 3: Security Analysis (SAST)
  # ============================================
  sast_job:
  name: 🛡️ Security Analysis (SAST)
  runs-on: ubuntu-latest
  needs: test_job

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: "fs"
        scan-ref: "."
        format: "sarif"
        output: "trivy-results.sarif"
        exit-code: "0"
        ignore-unfixed: true
        severity: "CRITICAL,HIGH"

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: "trivy-results.sarif"
      permissions:
        security-events: write

  # ============================================
  # JOB 4: Package & Build
  # ============================================
  package_job:
    name: 📦 Package & Build
    runs-on: ubuntu-latest
    needs: [code_quality_job, sast_job]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # ============================================
  # JOB 5: Canary Deployment
  # ============================================
  canary_job:
    name: 🧪 Canary Deployment
    runs-on: ubuntu-latest
    needs: package_job
    if: github.ref == 'refs/heads/main'
    environment: canary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist

      - name: Deploy to Canary
        run: |
          echo "🚀 Deploying to canary environment..."
          echo "✅ Canary deployment successful"
          echo "🔗 URL: https://canary.weather-app.com"

  # ============================================
  # JOB 6: Production Deployment
  # ============================================
  deploy_prod_job:
    name: 🚀 Production Deployment
    runs-on: ubuntu-latest
    needs: canary_job
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "✅ Production deployment successful"
          echo "🔗 URL: https://api.weather-app.com"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Production Release

            ### Changes
            - Commit: ${{ github.sha }}
            - Version: ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
