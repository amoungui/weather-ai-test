name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================
  # JOB 1: Tests
  # ============================================
  test_job:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      
      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term -v
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # JOB 2: Code Quality & SAST
  # ============================================
  code_quality_job:
    name: 🔍 Code Quality & SAST
    runs-on: ubuntu-latest
    needs: test_job
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy bandit safety pylint
      
      # ===== Linting =====
      - name: Check code formatting with black
        run: |
          black --check --diff app/ || true
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff app/ || true
      
      - name: Lint with flake8
        run: |
          flake8 app/ --count --max-complexity=10 --max-line-length=100 --statistics --exit-zero
      
      - name: Lint with pylint
        run: |
          pylint app/ --exit-zero --fail-under=7.0 || true
      
      # ===== Security Scanning =====
      - name: Security scan with bandit
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
      
      - name: Check dependencies vulnerabilities with safety
        run: |
          safety check --full-report || true
      
      - name: Static type checking with mypy
        run: |
          mypy app/ --ignore-missing-imports --no-strict-optional || true
      
      # ===== Upload reports =====
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
      
      - name: Upload linting reports
        uses: actions/upload-artifact@v4
        with:
          name: linting-reports
          path: |
            flake8-report.txt
            pylint-report.txt

  # ============================================
  # JOB 3: Security Analysis (SAST)
  # ============================================
  sast_job:
    name: 🛡️ Security Analysis (SAST)
    runs-on: ubuntu-latest
    needs: test_job
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run dependency scanning
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause

  # ============================================
  # JOB 4: Package & Build
  # ============================================
  package_job:
    name: 📦 Package & Build
    runs-on: ubuntu-latest
    needs: [code_quality_job, sast_job]
    if: github.ref == 'refs/heads/main' || github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      
      - name: Create Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: weather-app:${{ github.sha }}
          file: Dockerfile
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            Dockerfile

  # ============================================
  # JOB 5: Canary Deployment
  # ============================================
  canary_job:
    name: 🧪 Canary Deployment
    runs-on: ubuntu-latest
    needs: package_job
    if: github.ref == 'refs/heads/main'
    environment: canary
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
      
      - name: Deploy to Canary (Render)
        uses: johnbeynon/render-deploy-action@v1
        with:
          service-id: ${{ secrets.RENDER_CANARY_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true
      
      - name: Smoke Tests
        run: |
          sleep 30
          curl -f https://canary.weather-app.com/health || exit 1
          curl -f https://canary.weather-app.com/api/weather?lat=-1.2921&lon=36.8219 || exit 1
      
      - name: Canary Validation
        run: |
          echo "✅ Canary deployment successful"
          echo "Canary URL: https://canary.weather-app.com"

  # ============================================
  # JOB 6: Production Deployment
  # ============================================
  deploy_prod_job:
    name: 🚀 Production Deployment
    runs-on: ubuntu-latest
    needs: canary_job
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
      
      - name: Deploy to Production (Render)
        uses: johnbeynon/render-deploy-action@v1
        with:
          service-id: ${{ secrets.RENDER_PROD_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true
      
      - name: Health Check
        run: |
          sleep 30
          curl -f https://api.weather-app.com/health || exit 1
          curl -f https://api.weather-app.com/api/weather?lat=-1.2921&lon=36.8219 || exit 1
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Production Release
            
            ### Changes
            - Commit: ${{ github.sha }}
            - Version: ${{ github.run_number }}
            
            ### Deployed to
            - Production: https://api.weather-app.com
            - Canary: https://canary.weather-app.com
          draft: false
          prerelease: false
          files: |
            ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify deployment success
        run: |
          echo "✅ Production deployment successful!"
          echo "🔗 URL: https://api.weather-app.com"
          echo "📊 Dashboard: https://api.weather-app.com/dashboard"