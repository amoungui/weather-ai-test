[pytest]
# Chemins à tester
testpaths = tests

# Options par défaut - NE PAS GÉNÉRER DE RAPPORT HTML
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term
    --cov-fail-under=0

# Dossiers à ignorer
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    node_modules
    app/templates
    app/static

# Marqueurs personnalisés
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow tests

# Variables d'environnement pour les tests
env =
    APP_ENV=testing
    APP_DEBUG=true
    WEATHER_AI_API_KEY=test_key
    OPENWEATHER_API_KEY=test_key